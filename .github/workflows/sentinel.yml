name: Mintlify Sentinel

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main

jobs:

  # Run the full test suite first.
  # If tests fail, the pipeline job does not run.
  test:
    name: Run pytest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests with coverage
        run: pytest tests/ -v --cov=scripts --cov-report=term-missing

  # Run the full 4-stage Sentinel pipeline after tests pass.
  # Uploads output/changelog.mdx as a downloadable workflow artifact.
  pipeline:
    name: Run Sentinel pipeline
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Sentinel pipeline
        run: python main.py

      - name: Upload changelog artifact
        uses: actions/upload-artifact@v4
        with:
          name: changelog-mdx
          path: output/changelog.mdx
          if-no-files-found: warn
